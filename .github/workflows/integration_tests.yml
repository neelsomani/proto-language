name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    if: github.event.pull_request.draft == false
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.CI_SUBMODULE_ACCESS }}
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mafft
    - name: Install micromamba
      run: |
        MAMBA_DIR="${{ github.workspace }}/proto-tools/.micromamba"
        mkdir -p "$MAMBA_DIR/bin"
        curl -sSL https://github.com/mamba-org/micromamba-releases/releases/latest/download/micromamba-linux-64 -o "$MAMBA_DIR/bin/micromamba"
        chmod 755 "$MAMBA_DIR/bin/micromamba"
        "$MAMBA_DIR/bin/micromamba" --version
    - uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
        restore-keys: ${{ runner.os }}-uv-
    - name: Install dependencies
      run: |
        pip install --upgrade pip uv
        uv pip install --system -e ./proto-tools
        uv pip install --system -e ".[dev]"
    - run: pytest --integration --cpu -v
