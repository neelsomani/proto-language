[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proto-language"
version = "1.0.2"
description = "A high level programming language for generative biology"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "Proto Team"}
]

requires-python = ">=3.10"

# Core dependencies (language + basic constraints + infrastructure)
dependencies = [
    # Core framework
    "pydantic>=2.0.0",

    # Scientific computing
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",

    # Bioinformatics
    "biopython>=1.81",
    "biotite>=0.38.0",
    "gemmi",

    # Infrastructure
    "torch>=2.0.0",
    "google-cloud-storage>=2.0.0",

    # Utilities
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "tqdm>=4.65.0",
    "openpyxl>=3.0.0",
]

[project.optional-dependencies]
# CPU bioinformatics tools
tools = [
    "orfipy>=0.0.4",
    "pyrodigal>=3.0.0",
    "promotercalculator>=1.0.0",
    "sinkhorn-transformer",
    "huggingface_hub>=0.16.0",
    "rdkit",
    # Structure visualization
    "py3Dmol>=2.0.0",
    "matplotlib",
    # File Parsing/Indexing
    "pyfaidx",
    "docstring-parser>=0.15",
    "ipython",
]

# GPU dependencies
gpu = [
    # ML frameworks
    "transformers>=4.30.0",

    # Sequence scoring models
    "alphagenome>=0.2.0",

    # Structure prediction and scoring models
    #"colabfold[alphafold]>=1.5.5", # Due to dependency conflicts, needs to be installed separately with --no-deps.

    # Structure dynamics models
    "bioemu",

    # Inverse folding
    #"colabdesign @ git+https://github.com/sokrypton/ColabDesign.git@v1.1.1", # REMOVED FOR NOW DUE TO CONFLICTS WITH EVO2
]

# API dependencies
api = [
    # API server
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-dotenv>=1.0.0",
    "sse-starlette>=1.6.5",

    # Database
    "sqlmodel>=0.0.8",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.29.0",
    "psycopg2>=2.9.0",

    # Task queue
    "worker>=5.3.0",
    "cache>=5.0.0",

    # AI agents
    "openai",
    "openai-agents[litellm]",
    "litellm",
    "ddgs",
    "rank-bm25",
    "httpx",
    "jsonpatch",
    "jsonpointer",
    "pick>=2.0.0",

    # Remote GPU execution

]

# Development dependencies
dev = [
    "pytest>=7.3.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "pre-commit>=3.3.0",
    "jupyter>=1.1.1",
    "ipykernel>=6.25.0",
    "ipywidgets>=8.0.0",
    "ipymol>=0.5",
    "matplotlib>=3.7.0",
    "seaborn>=0.13.0",
]


# All dependencies
all = [
    "proto-language[tools,gpu,api,dev,docs]",
]

[project.urls]
Homepage = "https://github.com/evo-design/proto-language"
Repository = "https://github.com/evo-design/proto-language"
Documentation = "https://github.com/evo-design/proto-language#readme"
"Bug Tracker" = "https://github.com/evo-design/proto-language/issues"


[tool.setuptools.packages.find]
include = ["proto_language*", "api*", "deployment*"]
exclude = ["tests*", "examples*", "*.tests*", "*.tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
pythonpath = ["."]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "asyncio: mark test as requiring asyncio",
    "cpu: CPU-only tests",
    "gpu: GPU-required tests",
    "slow: Slow tests that may take several minutes",
    "integration: Integration tests",
    "skip_ci: Skip test in GitHub Actions CI",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["proto_language", "api", "deployment"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Too strict for research code
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    # Bioinformatics packages
    "biotite.*",
    "orfipy.*",
    "pyrodigal.*",
    "promotercalculator.*",
    # ML/GPU packages
    "esm.*",
    "boltz.*",
    "chai_lab.*",
    "alphagenome.*",
    # Visualization
    "py3Dmol.*",
    # Task queue
    "worker.*",
    "kombu.*",
    # Cloud & storage
    "cloud.*",
    "google.cloud.*",
]
ignore_missing_imports = true
