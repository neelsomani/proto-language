[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proto-language"
version = "0.1.0"
description = "A framework for constraint-based genomic sequence design and optimization"
readme = "README.md"
license = {text = "Apache 2.0"}
authors = [
    {name = "Proto Team"}
]

requires-python = ">=3.10"

# Core CPU-only dependencies
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "biopython>=1.81",
    "biotite>=0.38.0",
    "orfipy>=0.0.4",
    "pyyaml>=6.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.13.0",
    "requests>=2.31.0",
    "httpx>=0.25.0",
    "huggingface_hub>=0.16.0",
 
    # API dependencies
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "sqlmodel>=0.0.8",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.28.0",
    "psycopg2-binary>=2.9.0",
    "greenlet>=2.0.0",
    # Task queue
    "worker>=5.3.0",
    "cache>=5.0.0",
    "kombu>=5.3.0",
    "google-cloud-storage>=2.10.0",
    # Machine Learning (CPU version)
    "torch>=2.0.0",
    "transformers>=4.30.0",
    # Visualization
    "py3Dmol>=2.0.0",
    # Development and testing
    "pytest>=7.3.0",
]

[project.optional-dependencies]
# GPU dependencies for structure prediction and ML models
gpu = [
    "boltz==0.4.1",
    "chai_lab==0.6.1",
    "esm @ git+https://github.com/bviggiano/esm.git@fix/178" # NOTE: Running into this bug for general inference when installing from PyPI: https://github.com/evolutionaryscale/esm/issues/178
]

# Development dependencies
dev = [
    "pytest>=7.3.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "pre-commit>=3.3.0",
]

# Jupyter notebook dependencies
notebooks = [
    "jupyter>=1.1.1",
    "ipykernel>=6.25.0",
    "ipywidgets>=8.0.0",
    "ipymol>=0.9.0",
]

# Complete installation with all features
all = [
    "proto-language[gpu,dev,notebooks]",
]

[project.urls]
Homepage = "https://github.com/evo-design/proto-language"
Repository = "https://github.com/evo-design/proto-language"


[tool.setuptools.packages.find]
include = ["proto_language*", "api*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
pythonpath = ["."]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "cpu: CPU-only tests",
    "gpu: GPU-required tests",
    "slow: Slow tests that may take several minutes",
    "integration: Integration tests",
]

[tool.black]
line-length = 88
target-version = ['py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["proto_language", "api"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "biotite.*",
    "orfipy.*",
    "esm.*",
    "boltz.*",
    "chai_lab.*",
    "py3Dmol.*",
]
ignore_missing_imports = true