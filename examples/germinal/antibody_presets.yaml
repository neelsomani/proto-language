      hotspots: A37,A39,A41,A96,A98
    # Binder geometry
    vh_fw_lengths: [25, 17, 38, 11]
    vh_cdr_lengths: [8, 8, 13]
    # This preset uses the slightly different PD-L1 linker/ VL decomposition.
    linker_length: 15
    vl_fw_lengths: [26, 17, 33, 10]
    vl_cdr_lengths: [6, 6, 9]
    # Hallucination thresholds / schedule
    plddt_threshold: 0.8
    iptm_threshold: 0.67
    ipae_threshold: 0.28
    logits_steps: 60
    softmax_steps: 35
    search_steps: 10
    search_mutation_rate: 0.05
    # AF2 / AbLang parity knobs used by this script
    plddt_loss_weight: 0.5
    iptm_loss_weight: 0.75
    beta_strand_loss_weight: 0.1
    framework_contact_offset: 1.0
    ablm_logit_start_weight: 0.0
    ablm_logit_end_weight: 0.2
    min_lr_scale: 0.25
    zero_norm_eps: 1.0e-4
    lr_schedule: linear
    ban_cysteine: false
    cofold_tool: alphafold3
    msa_mode: "target"
    # Redesign sampling
    num_seqs: 40
    max_mpnn_sequences: 4
    sampling_temp: 0.2
    # Pre-redesign filters
    initial_filter:
      clashes: {value: 1, operator: "<"}
      binder_near_hotspot: {value: true, operator: "=="}
      cdr3_hotspot_contacts: {value: 0, operator: ">"}
      percent_interface_cdr: {value: 0.5, operator: ">"}
      interface_sc: {value: 0.5, operator: ">"}
    # Final filters
    final_filter:
      clashes: {value: 1, operator: "<"}
      sc_rmsd: {value: 7.0, operator: "<"}
      binder_near_hotspot: {value: true, operator: "=="}
      cdr3_hotspot_contacts: {value: 0, operator: ">"}
      percent_interface_cdr: {value: 0.7, operator: ">"}
      interface_hydrophobicity: {value: 45, operator: ">"}
      pdockq2: {value: 0.23, operator: ">"}
      external_plddt: {value: 0.85, operator: ">"}
      external_iptm: {value: 0.74, operator: ">"}
      external_ptm: {value: 0.84, operator: ">="}
      external_pae: {value: 8, operator: "<"}
      interface_sc: {value: 0.5, operator: ">"}
