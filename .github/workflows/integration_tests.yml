name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integration-tests:
    # Only run on non-draft PRs
    if: github.event.pull_request.draft == false
    name: Run Integration Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.CI_SUBMODULE_ACCESS }}
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mafft

    - name: Install micromamba
      run: |
        # Pre-install micromamba so ToolInstance doesn't download it at runtime.
        # Uses conda-forge GitHub release instead of micro.mamba.pm (SSL issues).
        # ToolInstance looks for .micromamba/bin/micromamba relative to the
        # proto-tools project root.
        MAMBA_DIR="${{ github.workspace }}/proto-tools/.micromamba"
        mkdir -p "$MAMBA_DIR/bin"
        curl -sSL https://github.com/mamba-org/micromamba-releases/releases/latest/download/micromamba-linux-64 -o "$MAMBA_DIR/bin/micromamba"
        chmod 755 "$MAMBA_DIR/bin/micromamba"
        "$MAMBA_DIR/bin/micromamba" --version

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip uv
        uv pip install --system -e ./proto-tools
        uv pip install --system -e ".[all]"

    - name: Run integration tests
      run: |
        pytest --integration --cpu -v
