[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proto-language"
version = "0.1.0"
description = "A framework for constraint-based genomic sequence design and optimization"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "Proto Team"}
]

requires-python = ">=3.10"

# Core dependencies (CPU-only, minimal for running the framework)
dependencies = [
    # Core framework
    "pydantic>=2.0.0",
    
    # Scientific computing
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",
    
    # Bioinformatics
    "biopython>=1.81",
    "biotite>=0.38.0",
    "orfipy>=0.0.4",
    "pyrodigal>=3.0.0",
    "promotercalculator>=1.0.0",
    "pyhmmer",
    
    # Machine Learning (CPU-only)
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "huggingface_hub>=0.16.0",
    "accelerate",
    
    # Cloud compute

    
    # API & Web Server
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-dotenv>=1.0.0",
    "sse-starlette>=1.6.5",
    
    # Database
    "sqlmodel>=0.0.8",
    "sqlalchemy>=2.0.0",
    "aiosqlite>=0.19.0",
    "asyncpg>=0.28.0",
    "psycopg2-binary>=2.9.0",
    "greenlet>=2.0.0",

    
    # Task queue & async processing
    "worker>=5.3.0",
    "cache>=5.0.0",
    "kombu>=5.3.0",
    
    # Storage & utilities
    "google-cloud-storage==3.2.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "httpx>=0.25.0",
    
    # Visualization (minimal)
    "matplotlib>=3.7.0",
    "seaborn>=0.13.0",
    "py3Dmol>=2.0.0",
    
    # Sequence scoring (CPU-only)
    "alphagenome>=0.2.0",

    # Splice Transformer
    "sinkhorn-transformer",

    # Testing
    "pytest>=7.3.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]

[project.optional-dependencies]
# GPU dependencies for structure prediction and sequence scoring models
gpu = [
    "esm @ git+https://github.com/bviggiano/esm.git@fix/178",  # See: https://github.com/evolutionaryscale/esm/issues/178
    "borzoi-pytorch",
    "enformer-pytorch",
]

# Development dependencies for contributors
dev = [
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "pre-commit>=3.3.0",
]

# Jupyter notebook dependencies for running examples
notebooks = [
    "jupyter>=1.1.1",
    "ipykernel>=6.25.0",
    "ipywidgets>=8.0.0",
    "ipymol>=0.9.0",
]

[project.urls]
Homepage = "https://github.com/evo-design/proto-language"
Repository = "https://github.com/evo-design/proto-language"
Documentation = "https://github.com/evo-design/proto-language#readme"
"Bug Tracker" = "https://github.com/evo-design/proto-language/issues"


[tool.setuptools.packages.find]
include = ["proto_language*", "api*", "deployment*"]
exclude = ["tests*", "examples*", "*.tests*", "*.tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
pythonpath = ["."]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "asyncio: mark test as requiring asyncio",
    "cpu: CPU-only tests",
    "gpu: GPU-required tests",
    "slow: Slow tests that may take several minutes",
    "integration: Integration tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["proto_language", "api", "deployment"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Too strict for research code
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    # Bioinformatics packages
    "biotite.*",
    "orfipy.*",
    "pyrodigal.*",
    "promotercalculator.*",
    # ML/GPU packages
    "esm.*",
    "boltz.*",
    "chai_lab.*",
    "borzoi_pytorch.*",
    "enformer_pytorch.*",
    "alphagenome.*",
    # Visualization
    "py3Dmol.*",
    # Task queue
    "worker.*",
    "kombu.*",
    # Cloud & storage
    "cloud.*",
    "google.cloud.*",
]
ignore_missing_imports = true