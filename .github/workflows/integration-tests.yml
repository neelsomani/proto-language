name: Integration Tests

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC (10pm PST)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.CI_SUBMODULE_ACCESS }}
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mafft
    - name: Install micromamba
      run: |
        MAMBA_DIR="${{ github.workspace }}/proto-tools/.micromamba"
        mkdir -p "$MAMBA_DIR/bin"
        curl -sSL https://github.com/mamba-org/micromamba-releases/releases/latest/download/micromamba-linux-64 -o "$MAMBA_DIR/bin/micromamba"
        chmod 755 "$MAMBA_DIR/bin/micromamba"
        "$MAMBA_DIR/bin/micromamba" --version
    - name: Install dependencies
      run: |
        uv pip install --system -e ./proto-tools
        uv pip install --system -e ".[dev]"
    - run: pytest --integration --cpu -v
