name: Unit Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-cpu:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-tests'))
    name: Run CPU Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.CI_SUBMODULE_ACCESS }}
        submodules: recursive
    - uses: astral-sh/setup-uv@v5
      with:
        version: "0.11.8"
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Authenticate uv for private git deps
      run: git config --global url."https://x-access-token:${{ secrets.CI_SUBMODULE_ACCESS }}@github.com/".insteadOf "https://github.com/"
    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"
        uv pip install --system -e ./proto-tools
    - run: pytest --cpu-only -q --override-ini="log_cli=false" --cov --cov-report=term-missing
